<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <title>Login - Silent Hill</title>

    <link rel="stylesheet" href="login.css">

</head>

<body>

    <div class="main-wrapper">

        <div class="login-container">

            <h1>LOGIN</h1>

            <p class="subtitulo">
                Entre para descobrir os segredos...
            </p>

            <form id="loginForm">

                <label>E-mail</label>

                <input
                type="email"
                id="email"
                placeholder="Digite seu e-mail"
                required
                >

                <label>Senha</label>

                <input
                type="password"
                id="senha"
                placeholder="Digite sua senha"
                required
                >

                <button
                type="button"
                onclick="login()"
                >
                    ENTRAR
                </button>

                <div class="botoes-extras">

                    <a href="index.html" class="btn-voltar">
                        ⬅ Voltar para Home
                    </a>

                    <a href="cadastro.html" class="btn-cadastro">
                        🩸 Criar Conta
                    </a>

                </div>

            </form>

        </div>

    </div>

    <script src="login.js"></script>

</body>
</html>
