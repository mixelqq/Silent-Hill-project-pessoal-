<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Login - Silent Hill</title>
  <link rel="stylesheet" href="login.css">
</head>
<body>
  <div class="main-wrapper">
    <div class="login-container">
      <h1>LOGIN</h1>
      <p class="subtitulo">Entre para descobrir os segredos...</p>

      <form id="loginForm">
        <label>E-mail</label>
        <input type="email" id="email" name="email" placeholder="Digite seu e-mail" required>

        <label>Senha</label>
        <input type="password" id="senha" name="senha" placeholder="Digite sua senha" required>

        <button type="submit">ENTRAR</button>

        <div class="botoes-extras">
          <a href="index.html" class="btn-voltar">⬅ Voltar para Home</a>
          <a href="cadastro.html" class="btn-voltar">🩸 Criar Conta</a>
        </div>
      </form>
    </div>
  </div>

  <script>
    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = document.getElementById("email").value;
      const senha = document.getElementById("senha").value;

      const res = await fetch("/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, senha })
      });

      const data = await res.json();
      alert(data.message);

      if (data.success) {
        window.location.href = "index.html"; // redireciona para home
      }
    });
  </script>
</body>
</html>
