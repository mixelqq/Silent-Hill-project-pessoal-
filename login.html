<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<title>Login - Silent Hill</title>

<link rel="stylesheet" href="login.css">

</head>

<body>

<div class="login-container">

<h1>LOGIN</h1>

<p class="subtitulo">
Entre para descobrir os segredos...
</p>

<form id="loginForm">

<label>E-mail</label>

<input type="email"
id="email"
placeholder="Digite seu e-mail"
required>

<label>Senha</label>

<input type="password"
id="senha"
placeholder="Digite sua senha"
required>






<button type="submit">
ENTRAR
</button>

</form>

<p class="cadastro">
Ainda não tem conta?
<a href="#">Cadastre-se</a>
</p>

</div>

</body>

</html>
